# Prometheus scrape config for the optional observability sidecar.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node          # host metrics (CPU/mem/disk/net/FD/conntrack)
    static_configs: [{ targets: ['node-exporter:9100'] }]

  - job_name: cadvisor      # per-container metrics
    static_configs: [{ targets: ['cadvisor:8080'] }]

  - job_name: app           # your services exposing /metrics (OMS, courier, IoT)
    static_configs: [{ targets: ['host.docker.internal:4000'] }]

  # Synthetic / blackbox probes — external uptime + TLS expiry checks.
  - job_name: blackbox-http
    metrics_path: /probe
    params: { module: [http_2xx] }
    static_configs:
      - targets:
          - https://api.example.com/health
          - https://dashboard.example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
