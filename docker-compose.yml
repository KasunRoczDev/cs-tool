services:
  db:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
      POSTGRES_DB: monitoring
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      PORT: 4000
      DATABASE_URL: postgres://monitor:monitor@db:5432/monitoring
      JWT_SECRET: change-me-to-a-long-random-string
      DASHBOARD_ORIGIN: http://localhost:5173
      SCHEMA_PATH: /app/database/schema.sql
      PRODUCTS_MIGRATION_PATH: /app/database/products_migration.sql
      SETTINGS_MIGRATION_PATH: /app/database/settings_migration.sql
      NOTIF_MIGRATION_PATH: /app/database/notifications_migration.sql
      TOPOLOGY_MIGRATION_PATH: /app/database/topology_migration.sql
      # ── Email notifications (set these to enable) ──────────────────────
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: 587
      # SMTP_SECURE: "false"
      # SMTP_USER: monitor@example.com
      # SMTP_PASS: your-smtp-password
      # SMTP_FROM: monitor@example.com
    ports:
      - "4000:4000"
    volumes:
      # Mount the schema so migrate.js can apply it (build context can't reach ../database).
      - ./database/schema.sql:/app/database/schema.sql:ro
      - ./database/products_migration.sql:/app/database/products_migration.sql:ro
      - ./database/notifications_migration.sql:/app/database/notifications_migration.sql:ro
      - ./database/settings_migration.sql:/app/database/settings_migration.sql:ro
      - ./database/topology_migration.sql:/app/database/topology_migration.sql:ro
    depends_on:
      db:
        condition: service_healthy
    # Apply schema + seed admin, then start the API.
    command: sh -c "node scripts/migrate.js && node dist/main.js"

  dashboard:
    build:
      context: ./dashboard
      args:
        # Baked into the build so Next's external rewrite points at the backend service.
        BACKEND_URL: http://backend:4000
    environment:
      BACKEND_URL: http://backend:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  dbdata:
